version: "1"
name: "resonant-code-default"
description: "Default playbook for resonant-code skills."

metadata:
  owner: "Sovea"
  status: "mvp"

layers:
  core:
    type: "file"
    path: "core.md"
    required: true

  languages:
    type: "directory"
    path: "languages"
    required: true
    default: "typescript"
    entries:
      - id: "typescript"
        path: "typescript/core.md"

  frameworks:
    type: "directory"
    path: "frameworks"
    required: false
    entries: []

  task-types:
    type: "directory"
    path: "task-types"
    required: true
    entries:
      - id: "feature"
        path: "feature.md"
      - id: "bugfix"
        path: "bugfix.md"
      - id: "refactor"
        path: "refactor.md"
      - id: "migration"
        path: "migration.md"

  domains:
    type: "directory"
    path: "domains"
    required: false
    entries: []

